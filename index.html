<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseFlow_Login</title>
    <link rel="stylesheet" href="login.css?v=3.1.0">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="manifest" href="manifest.json?v=3.1.0">
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

    <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function (OneSignal) {
    await OneSignal.init({
        appId: "cf6275a4-6b3d-4adb-8fef-06cd3a771b72",

        safari_web_id: "web.onesignal.auto.147da6f8-95e8-4f3e-9e77-8dc52e1c58f0",

        notifyButton: {
        enable: true,
        },

    });
    });

    </script>
</head>

<body>
    <div class="login-header">

    <i class="fa-solid fa-wallet app-logo"></i>

    <h1>
        ExpenseFlow
    </h1>

<p id="changingText">

    Track Expenses.

</p>


</div>

    <div class="login-card">

    <h2>PIN Login</h2>

    <p>
        Enter Your Assigned UNIQUE 4 Digit PIN
    </p>

    <div  class="pin-container">

        <input
            type="password"
            maxlength="1"
            class="pin-box">

        <input
            type="password"
            maxlength="1"
            class="pin-box">

        <input
           type="password"
            maxlength="1"
            class="pin-box">

        <input
            type="password"
            maxlength="1"
            class="pin-box">

    </div>

    <button
        id="verifyBtn">
        <i class="fa-solid fa-shield-halved"></i>
        Verify PIN

    </button>

    <div class="animated-tagline">

    <span class="gradient-text">
        Track.
    </span>

    <span class="gradient-text">
        Save.
    </span>

    <span class="gradient-text">
        Grow.
    </span>

</div>

<p class="sub-text">

    Smart expense management for every month

</p>
    
<div
    id="toast"
    class="toast">
</div>

</div>
<div id="networkBanner" class="network-banner">

    <span id="networkText">
        🟢 Internet Connected
    </span>

    <button
        class="network-close"
        onclick="closeNetworkBanner()">

        ×

    </button>

</div>

<div class="app-version">

    Version v3.1.0 [Stable Release]

</div>

<script type="module" src="login.js?v=3.1.0"></script>
</body>
</html>
