name: Daily Expense Reminder

on:
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest

    steps:
      - name: Send OneSignal Notification
        run: |
          RESPONSE=$(curl -s -X POST "https://api.onesignal.com/notifications" \
            -H "Authorization: Bearer ${{ secrets.ONESIGNAL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id":"${{ secrets.ONESIGNAL_APP_ID }}",
              "include_subscription_ids":[
                "7eae6932-6892-42ce-b0d9-3b4705c47930"
              ],
              "target_channel":"push",
              "headings":{
                "en":"🧪 API Test"
              },
              "contents":{
                "en":"Testing direct Subscription ID notification."
              },
              "url":"https://naveensiriveri24-jcoder.github.io/"
            }')

          echo "$RESPONSE"
