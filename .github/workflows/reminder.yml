name: ExpenseFlow Morning Test

on:
  workflow_dispatch:

  schedule:
    # 8:00 AM IST (2:30 AM UTC)
    - cron: '30 2 * * *'

jobs:
  send-notification:
    runs-on: ubuntu-latest

    steps:
      - name: Send Morning Test Notification
        run: |
          RESPONSE=$(curl -s -X POST "https://api.onesignal.com/notifications" \
            -H "Content-Type: application/json" \
            -H "Authorization: Key ${{ secrets.ONESIGNAL_API_KEY }}" \
            -d '{
              "app_id":"${{ secrets.ONESIGNAL_APP_ID }}",
              "target_channel":"push",
              "included_segments":["Total Subscriptions"],
              "headings":{
                "en":"🌅 ExpenseFlow Morning Test"
              },
              "contents":{
                "en":"Good morning! This is an automatic GitHub Actions test notification."
              },
              "url":"https://naveensiriveri24-jcoder.github.io/"
            }')

          echo "$RESPONSE"
