name: Daily Expense Reminder

on:
  schedule:
    # Runs every day at 1:30 PM UTC (7:00 PM IST)
    - cron: "30 13 * * *"

  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest

    steps:
      - name: Send OneSignal Notification
        run: |
          curl --request POST \
          --url https://api.onesignal.com/notifications \
          --header "Authorization: Key ${{ secrets.ONESIGNAL_API_KEY }}" \
          --header "accept: application/json" \
          --header "content-type: application/json" \
          --data '{
            "app_id":"${{ secrets.ONESIGNAL_APP_ID }}",
            "included_segments":["Subscribed Users"],
            "headings":{"en":"💰 ExpenseFlow Reminder"},
            "contents":{"en":"Don'\''t forget to add today'\''s expenses before the day ends."},
            "url":"https://naveensiriveri24-jcoder.github.io/"
          }'